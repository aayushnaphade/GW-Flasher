<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GW Flasher - ESP32-S3 Firmware Deployment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles-v2.css" />
    <script type="module" src="https://unpkg.com/esp-web-tools@latest/dist/web/install-button.js?module"></script>
    <script type="module" src="js/auth-check.js"></script>
    <script type="module" src="js/app-v2.js" defer></script>
  </head>
  <body>
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
          <line x1="8" y1="21" x2="16" y2="21"></line>
          <line x1="12" y1="17" x2="12" y2="21"></line>
        </svg>
        <div>
          <h1 class="topbar-title">GW Flasher</h1>
          <span class="topbar-subtitle">Firmware Deployment Utility</span>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn-ghost btn-sm" onclick="logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Logout
        </button>
      </div>
    </header>

    <!-- Main Workspace -->
    <div class="workspace">
      <!-- Left Panel: Device & Flash -->
      <aside class="panel-left">
        <!-- Device Status - PROMINENT -->
        <section class="device-status">
          <div class="status-indicator">
            <div class="status-dot" data-status="disconnected"></div>
            <div class="status-text">
              <span class="status-label" data-device-status>DEVICE DISCONNECTED</span>
              <span class="status-detail" data-device-detail>—</span>
              <span class="status-port" data-device-port></span>
            </div>
          </div>
        </section>

        <!-- Flash Action - DOMINANT -->
        <section class="flash-section">
          <button class="btn-flash" data-flash-button disabled>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
            <span class="flash-text">FLASH FIRMWARE</span>
          </button>
          
          <!-- Hidden ESP Web Tools component -->
          <esp-web-install-button 
            id="esp-install" 
            manifest="firmware/manifest.json"
            style="display: none;">
          </esp-web-install-button>
        </section>

        <!-- Firmware Info - COMPACT -->
        <section class="info-section">
          <div class="info-compact">
            <div class="info-pair">
              <span class="info-key">VERSION</span>
              <span class="info-val" data-fw-version>—</span>
            </div>
            <div class="info-pair">
              <span class="info-key">BUILD</span>
              <span class="info-val" data-fw-date>—</span>
            </div>
            <div class="info-pair">
              <span class="info-key">TARGET</span>
              <span class="info-val" data-fw-target>ESP32-S3</span>
            </div>
            <div class="info-pair">
              <span class="info-key">COMMIT</span>
              <span class="info-val" data-fw-commit>—</span>
            </div>
            <div class="info-pair">
              <span class="info-key">FLASH</span>
              <span class="info-val">8MB</span>
            </div>
            <div class="info-pair">
              <span class="info-key">STATUS</span>
              <span class="info-val" data-fw-status>READY</span>
            </div>
          </div>
        </section>
      </aside>

      <!-- Right Panel: Serial Monitor - DOMINANT -->
      <main class="panel-right">
        <section class="console-section">
          <div class="console-toolbar">
            <div class="console-label">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="4 17 10 11 4 5"></polyline>
                <line x1="12" y1="19" x2="20" y2="19"></line>
              </svg>
              <span>SERIAL MONITOR</span>
              <span class="console-badge" data-console-badge>DISCONNECTED</span>
            </div>
            <div class="console-actions">
              <button class="btn-console" data-monitor-connect>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="22" y1="2" x2="11" y2="13"></line>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                CONNECT
              </button>
              <button class="btn-console" data-monitor-disconnect hidden>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"></circle>
                  <rect x="9" y="9" width="6" height="6"></rect>
                </svg>
                DISCONNECT
              </button>
              <button class="btn-console" data-monitor-clear>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
                CLEAR
              </button>
            </div>
          </div>
          
          <pre class="console-output" data-console-output></pre>
        </section>
      </main>
    </div>
  </body>
</html>
