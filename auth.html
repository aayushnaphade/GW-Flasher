<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in — GW Flasher</title>
    <meta name="color-scheme" content="dark light" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1117;
        --panel: #151922;
        --elevated: #1b2130;
        --focus: #222938;
        --border: #2f3748;
        --border-soft: #232a37;
        --text: #f5f7fa;
        --text-2: #a4afc1;
        --muted: #6b7383;
        --error: #ef4444;
        --accent: #00c389;
        --accent-press: #00a676;
        --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --mono: "JetBrains Mono", Consolas, monospace;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: var(--font);
        background:
          radial-gradient(900px 500px at 50% -10%, color-mix(in srgb, var(--accent) 10%, transparent), transparent),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 380px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }
      .card__head {
        padding: 24px 24px 18px;
        border-bottom: 1px solid var(--border-soft);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }
      .brand-mark {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--elevated);
        color: var(--accent);
      }
      .brand-mark svg { width: 19px; height: 19px; }
      .brand-name { font-weight: 600; font-size: 15px; }
      .brand-sub {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--muted);
      }
      h1 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
      .lead { font-size: 13px; color: var(--text-2); }
      .card__body { padding: 20px 24px 24px; }
      .field { margin-bottom: 14px; }
      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-2);
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        height: 40px;
        padding: 0 12px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 7px;
        color: var(--text);
        font: inherit;
        font-size: 14px;
        transition: border-color 0.12s, box-shadow 0.12s;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 25%, transparent);
      }
      input::placeholder { color: var(--muted); }
      .btn {
        width: 100%;
        height: 42px;
        margin-top: 4px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #04130d;
        font: inherit;
        font-weight: 600;
        font-size: 14px;
        border-radius: 7px;
        cursor: pointer;
        transition: background 0.12s, opacity 0.12s;
      }
      .btn:hover:not(:disabled) { background: var(--accent-press); border-color: var(--accent-press); }
      .btn:disabled { opacity: 0.6; cursor: not-allowed; }
      .error {
        display: none;
        align-items: center;
        gap: 8px;
        background: color-mix(in srgb, var(--error) 14%, transparent);
        border: 1px solid color-mix(in srgb, var(--error) 40%, var(--border));
        color: color-mix(in srgb, var(--error) 85%, var(--text));
        padding: 10px 12px;
        border-radius: 7px;
        font-size: 13px;
        margin-bottom: 14px;
      }
      .error.show { display: flex; animation: shake 0.35s ease; }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        75% { transform: translateX(6px); }
      }
      .foot {
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid var(--border-soft);
        font-size: 11px;
        color: var(--muted);
        line-height: 1.5;
        font-family: var(--mono);
      }
      /* TOTP step */
      .totp { display: none; }
      .totp.show { display: block; animation: fade 0.25s ease; }
      @keyframes fade {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .totp__info {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--elevated);
        border: 1px solid var(--border-soft);
        border-radius: 7px;
        padding: 10px 12px;
        font-size: 13px;
        color: var(--text-2);
        margin-bottom: 16px;
      }
      .totp__icon {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        flex: none;
        color: var(--accent);
      }
      .totp__icon svg { width: 18px; height: 18px; }
      .totp__code {
        font-family: var(--mono);
        font-size: 22px;
        letter-spacing: 8px;
        text-align: center;
        height: 48px;
      }
      .link-btn {
        width: 100%;
        margin-top: 12px;
        background: none;
        border: none;
        color: var(--text-2);
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        padding: 6px;
      }
      .link-btn:hover { color: var(--accent); }
      @media (prefers-reduced-motion: reduce) {
        *, .error.show, .totp.show { animation: none !important; transition: none !important; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card__head">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 7h16" /><path d="M4 12h10" /><path d="M4 17h7" /><path d="M17 14l3 3-3 3" />
            </svg>
          </span>
          <span>
            <div class="brand-name">GW Flasher</div>
            <div class="brand-sub">ESP32-S3 Workbench</div>
          </span>
        </div>
        <h1>Sign in</h1>
        <p class="lead">Authenticate to access the firmware workbench.</p>
      </div>

      <div class="card__body">
        <div id="error-message" class="error" role="alert"></div>

        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username" autofocus />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
          </div>
          <button type="submit" class="btn" id="login-btn">Sign in</button>
        </form>

        <div id="totp-section" class="totp">
          <div class="totp__info">
            <span class="totp__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="11" width="14" height="9" rx="2" />
                <path d="M8 11V8a4 4 0 0 1 8 0v3" />
              </svg>
            </span>
            <span>Enter the 6-digit code from your authenticator app.</span>
          </div>
          <form id="totp-form" onsubmit="handleTOTP(event)">
            <div class="field">
              <label for="totp-code">Verification code</label>
              <input
                type="text"
                id="totp-code"
                name="totp-code"
                class="totp__code"
                inputmode="numeric"
                pattern="[0-9]{6}"
                maxlength="6"
                placeholder="000000"
                autocomplete="one-time-code"
                required
              />
            </div>
            <button type="submit" class="btn" id="totp-btn">Verify</button>
            <button type="button" class="link-btn" onclick="backToLogin()">← Back to sign in</button>
          </form>
        </div>

        <p class="foot">
          Access is gated client-side. Credentials are configured by the
          deployment via repo variables.
        </p>
      </div>
    </div>

    <script src="js/auth-config.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
